<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recovery Logs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">BTS Recovery Monitor</div>
      <nav class="nav">
        <a href="demo-panel.html">Demo Panel</a>
        <a class="active" href="recovery-logs.html">Recovery Logs</a>
      </nav>
      <button onclick="BTS.logout()" style="margin-top:16px;width:100%;">Logout</button>
    </aside>
    <main class="content">
      <header class="topbar"><strong>System Recovery Logs</strong></header>
      <article class="card">
        <table>
          <thead><tr><th>ID</th><th>Scenario</th><th>Status</th><th>Details</th><th>Time</th></tr></thead>
          <tbody id="body"></tbody>
        </table>
      </article>
    </main>
  </div>

  <script src="assets/app.js"></script>
  <script>
    BTS.requireRole("ADMIN");
    BTS.api("/demo/recovery-logs").then((rows) => {
      document.getElementById("body").innerHTML = rows.map((r) => `
        <tr>
          <td>${r.recovery_id}</td>
          <td>${r.scenario_code || "-"}</td>
          <td><span class="badge ${BTS.badgeForStatus(r.status)}">${r.status}</span></td>
          <td>${r.details}</td>
          <td>${new Date(r.created_at).toLocaleString()}</td>
        </tr>
      `).join("");
    }).catch((e) => alert(e.message));
  </script>
</body>
</html>
