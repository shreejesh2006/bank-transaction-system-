<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Dashboard - Bank Transaction System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">BTS Employee Console</div>
      <nav class="nav">
        <a class="active" href="employee.html">Dashboard</a>
        <a href="reports.html">Branch Reports</a>
        <a href="settings.html">Settings</a>
      </nav>
      <button onclick="BTS.logout()" style="margin-top:16px;width:100%;">Logout</button>
    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <strong>Employee Operations Dashboard</strong>
          <div class="muted">KYC verification and branch customer support</div>
        </div>
        <div id="employeeName" class="muted"></div>
      </header>

      <article class="card">
        <h3>Branch Customers</h3>
        <table>
          <thead><tr><th>Name</th><th>Email</th><th>Customer Code</th><th>KYC Status</th></tr></thead>
          <tbody id="customerBody"></tbody>
        </table>
      </article>
    </main>
  </div>

  <script src="assets/app.js"></script>
  <script>
    const user = BTS.requireRole("EMPLOYEE", "ADMIN");
    document.getElementById("employeeName").textContent = `${user.fullName} (${user.role})`;

    async function loadData() {
      const rows = await BTS.api("/employee/branch-customers");
      document.getElementById("customerBody").innerHTML = rows.map((c) => `
        <tr>
          <td>${c.full_name}</td>
          <td>${c.email}</td>
          <td>${c.customer_code}</td>
          <td><span class="badge ${BTS.badgeForStatus(c.kyc_status)}">${c.kyc_status}</span></td>
        </tr>
      `).join("");
    }

    loadData().catch((e) => alert(e.message));
  </script>
</body>
</html>
