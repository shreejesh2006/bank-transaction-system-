<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transaction History</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">BTS Banking</div>
      <nav class="nav">
        <a href="customer.html">Customer</a>
        <a href="admin.html">Admin</a>
        <a class="active" href="transactions.html">Transactions</a>
      </nav>
      <button onclick="BTS.logout()" style="margin-top:16px;width:100%;">Logout</button>
    </aside>
    <main class="content">
      <header class="topbar"><strong>Transaction History / Statement</strong></header>
      <article class="card">
        <div class="toolbar">
          <input id="accountNumber" placeholder="Account number for statement" />
          <button id="btnStatement">Download Statement (JSON)</button>
        </div>
        <table>
          <thead><tr><th>Ref</th><th>Type</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </article>
    </main>
  </div>

  <script src="assets/app.js"></script>
  <script>
    const user = BTS.getUser();
    if (!user) window.location.href = "index.html";

    async function loadRows() {
      const path = user.role === "ADMIN" ? "/admin/transactions" : "/customer/transactions";
      const rows = await BTS.api(path);
      document.getElementById("tbody").innerHTML = rows.map((t) => `
        <tr>
          <td>${t.transaction_ref}</td>
          <td>${t.transaction_type}</td>
          <td>${BTS.money(t.amount)}</td>
          <td><span class="badge ${BTS.badgeForStatus(t.status)}">${t.status}</span></td>
          <td>${new Date(t.created_at).toLocaleString()}</td>
        </tr>
      `).join("");
    }

    document.getElementById("btnStatement").addEventListener("click", async () => {
      if (user.role !== "CUSTOMER") return;
      const accountNumber = document.getElementById("accountNumber").value.trim();
      const data = await BTS.api(`/customer/statement?accountNumber=${encodeURIComponent(accountNumber)}`);
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `statement-${accountNumber || "all"}.json`;
      a.click();
    });

    loadRows().catch((e) => alert(e.message));
  </script>
</body>
</html>
