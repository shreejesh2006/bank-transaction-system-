<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audit Logs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">BTS Audit Center</div>
      <nav class="nav">
        <a href="admin.html">Dashboard</a>
        <a class="active" href="audit-logs.html">Audit Logs</a>
      </nav>
      <button onclick="BTS.logout()" style="margin-top:16px;width:100%;">Logout</button>
    </aside>
    <main class="content">
      <header class="topbar"><strong>Audit Trail</strong></header>
      <article class="card">
        <table>
          <thead><tr><th>Audit ID</th><th>User ID</th><th>Action</th><th>Entity</th><th>Timestamp</th></tr></thead>
          <tbody id="body"></tbody>
        </table>
      </article>
    </main>
  </div>

  <script src="assets/app.js"></script>
  <script>
    BTS.requireRole("ADMIN");
    BTS.api("/admin/audit-logs").then((rows) => {
      document.getElementById("body").innerHTML = rows.map((r) => `
        <tr>
          <td>${r.audit_id}</td>
          <td>${r.user_id || "-"}</td>
          <td>${r.action_type}</td>
          <td>${r.entity_type || "-"}</td>
          <td>${new Date(r.created_at).toLocaleString()}</td>
        </tr>
      `).join("");
    }).catch((e) => alert(e.message));
  </script>
</body>
</html>
